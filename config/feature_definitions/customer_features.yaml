entity_type: customer

null_handlers:
  - column: session_duration_seconds
    strategy: median_impute
    add_indicator: true
  - column: plan_type
    strategy: fill
    fill_value: "unknown"

aggregations:
  - name: total_sessions_30d
    source_column: session_id
    function: count
    window_days: 30
  - name: total_sessions_90d
    source_column: session_id
    function: count
    window_days: 90
  - name: avg_session_duration_30d
    source_column: session_duration_seconds
    function: mean
    window_days: 30
  - name: stddev_session_duration_90d
    source_column: session_duration_seconds
    function: stddev
    window_days: 90
  - name: total_sessions_alltime
    source_column: session_id
    function: count

encodings:
  - name: plan_type_freq_encoded
    source_column: plan_type
    method: frequency
  - name: region_label_encoded
    source_column: region
    method: label

time_windows:
  - name: days_since_last_event
    source_column: event_date
    feature_type: days_diff
  - name: rolling_mean_sessions_7d
    source_column: session_id
    feature_type: rolling_mean
    window_days: 7
  - name: session_trend_slope_30d
    source_column: session_duration_seconds
    feature_type: rolling_slope
    window_days: 30
