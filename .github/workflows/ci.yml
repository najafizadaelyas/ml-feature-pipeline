name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  JAVA_VERSION: "17"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff==0.4.9
      - name: Run ruff
        run: ruff check src/ dags/ tests/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=src --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml

  dag-integrity:
    name: DAG Integrity Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////tmp/airflow_test.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PIPELINE_CONFIG_PATH: ${{ github.workspace }}/config/pipeline_config.yaml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Initialise Airflow DB
        run: airflow db migrate
      - name: Run DAG integrity tests
        run: pytest tests/dag_tests/ -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [unit-tests, dag-integrity]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Airflow image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/airflow/Dockerfile
          push: false
          tags: ml-feature-pipeline:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
